version: '3.8'

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Sa@12345"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  productservice:
    build:
      context: ./ProductService
    container_name: productservice
    depends_on:
      - sqlserver
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=ProductServiceDb;User Id=sa;Password=Sa@12345;TrustServerCertificate=True;"

  orderservice:
    build:
      context: ./OrderService
    container_name: orderservice
    depends_on:
      - sqlserver
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=OrderServiceDb;User Id=sa;Password=Sa@12345;TrustServerCertificate=True;"

volumes:
  sqlserver_data: